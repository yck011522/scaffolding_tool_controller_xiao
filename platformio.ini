; PlatformIO configuration for Scaffolding Tool Controller
; Board: Seeed Studio XIAO ESP32-S3 Sense

[platformio]
default_envs = xiao_esp32s3

; ── Shared settings ─────────────────────────────────────────────────
[env]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

; ── Main firmware ───────────────────────────────────────────────────
[env:xiao_esp32s3]
; src/main.cpp — integrated controller firmware

; ── Individual component tests ──────────────────────────────────────
; Build a specific test with:  pio run -e test_bldc_pwm
; Upload with:                 pio run -e test_bldc_pwm -t upload
; Monitor with:                pio device monitor

[env:test_bldc_pwm]
build_src_filter = -<*> +<../test/test_bldc_pwm/>

[env:test_bldc_feedback]
build_src_filter = -<*> +<../test/test_bldc_feedback/>

[env:test_ina_current]
build_src_filter = -<*> +<../test/test_ina_current/>

[env:test_rs485]
build_src_filter = -<*> +<../test/test_rs485/>

[env:test_oled]
build_src_filter = -<*> +<../test/test_oled/>

[env:test_buttons]
build_src_filter = -<*> +<../test/test_buttons/>

[env:test_camera]
build_src_filter = -<*> +<../test/test_camera/>
build_flags = -DARDUINO_RUNNING_CORE=0   ; Pin setup()/loop() to core 0, freeing core 1 for motor control
