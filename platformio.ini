; PlatformIO configuration for Scaffolding Tool Controller
; Board: Waveshare ESP32-S3-Tiny (board definition TBD)

[platformio]
default_envs = esp32s3

; ── Shared settings ─────────────────────────────────────────────────
[env]
platform  = espressif32
board     = esp32-s3-tiny
board_dir = boards
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

; ── Main firmware ───────────────────────────────────────────────────
[env:esp32s3]
; src/*.cpp — integrated controller firmware (motor control + buttons
; + OLED + USB/RS-485 protocol with NVS-persisted configuration).
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

; ── Individual component tests ──────────────────────────────────────
; Build a specific test with:  pio run -e test_bldc_pwm
; Upload with:                 pio run -e test_bldc_pwm -t upload
; Monitor with:                pio device monitor

[env:test_bldc_pwm]
build_src_filter = -<*> +<../test/test_bldc_pwm/>

[env:test_bldc_feedback]
build_src_filter = -<*> +<../test/test_bldc_feedback/>

[env:test_ina_current]
build_src_filter = -<*> +<../test/test_ina_current/>

[env:test_rs485]
build_src_filter = -<*> +<../test/test_rs485/>

[env:test_oled]
build_src_filter = -<*> +<../test/test_oled/>
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

[env:test_buttons]
build_src_filter = -<*> +<../test/test_buttons/>

[env:test_motor_control]
build_src_filter = -<*> +<../test/test_motor_control/>
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library

[env:test_motor_control_cleaned]
build_src_filter = -<*> +<../test/test_motor_control_cleaned/>
lib_deps =
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
